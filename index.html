<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube Queue</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div id="topbar-roles" class="topbar-roles"></div>
    <div id="topbar-links" class="topbar-links"></div>
    <div id="theme-switcher" class="theme-switcher"></div>
  </header>

  <main>
    <aside class="side-bar left-bar">
      <div class="left-bar-panel">
        <div class="left-bar-header">
          <div class="left-bar-actions">
            <button id="add-link-btn" class="left-add left-link-add" title="Add link">#</button>
            <button id="add-page-btn" class="left-add" title="Add page">+</button>
            <button id="delete-page-items-btn" class="left-add left-delete-add" title="Delete mode for page items">x</button>
          </div>
        </div>
        <div id="left-nav" class="left-nav"></div>
      </div>
    </aside>
    <section class="content-area">
      <div id="sections"></div>
    </section>
    <aside class="side-bar right-bar">
      <div id="saved-links" class="saved-links"></div>
    </aside>
  </main>

  <template id="item-template">
    <div class="item">
      <img class="thumb" src="" alt="thumbnail">
      <div class="meta">
        <div class="title"></div>
      </div>
    </div>
  </template>

  <div id="hold-action-dialog" class="hold-dialog hidden" aria-hidden="true">
    <div class="hold-dialog-backdrop"></div>
    <div class="hold-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="hold-dialog-title">
      <h2 id="hold-dialog-title" class="hold-dialog-title">Manage</h2>
      <div class="hold-dialog-actions">
        <div id="hold-link-editor" class="hold-link-editor hidden">
          <label class="hold-link-field">
            <span>Title</span>
            <input id="hold-link-title-input" type="text" autocomplete="off">
          </label>
          <label class="hold-link-field">
            <span>Link</span>
            <input id="hold-link-url-input" type="url" autocomplete="off">
          </label>
        </div>
        <div id="hold-page-random-editor" class="hold-link-editor hidden">
          <label class="hold-link-field">
            <span>Playlist Link</span>
            <input id="hold-page-random-url-input" type="url" autocomplete="off">
          </label>
          <div class="hold-range-row">
            <label class="hold-link-field">
              <span>From</span>
              <input id="hold-page-range-start-input" type="number" min="1" step="1" inputmode="numeric">
            </label>
            <label class="hold-link-field">
              <span>To</span>
              <input id="hold-page-range-end-input" type="number" min="1" step="1" inputmode="numeric">
            </label>
          </div>
        </div>
        <label id="hold-random-row" class="hold-random-row hidden">
          <input id="hold-random-checkbox" type="checkbox">
          <span>Random playlist</span>
        </label>
        <button id="hold-edit-btn" type="button">Edit</button>
        <button id="hold-move-up-btn" type="button">Move up</button>
        <button id="hold-move-down-btn" type="button">Move down</button>
        <button id="hold-delete-btn" type="button" class="danger">Delete</button>
      </div>
      <button id="hold-exit-btn" type="button" class="hold-exit-btn">Exit</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube Queue</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="title-group">
      <h1 id="view-title">Home</h1>
      <div id="header-links" class="header-links"></div>
    </div>
    <div class="controls">
      <button id="home-btn" class="selected">Home</button>
      <button id="fav-btn">Favorites</button>
      <button id="add-btn" title="Add header link">+</button>
    </div>
  </header>

  <main>
    <div id="sections"></div>
  </main>

  <template id="item-template">
    <div class="item">
      <img class="thumb" src="" alt="thumbnail">
      <div class="meta">
        <div class="title"></div>
        <div class="actions">
          <button class="star">☆</button>
          <button class="delete">✕</button>
        </div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>

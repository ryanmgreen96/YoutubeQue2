<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube Queue</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="title-group">
      <h1 id="view-title">Home</h1>
      <div id="header-links" class="header-links"></div>
    </div>
  </header>

  <main>
    <aside class="side-bar left-bar">
      <div class="left-bar-panel">
        <div class="left-bar-title">Pages</div>
        <div id="left-nav" class="left-nav"></div>
        <button id="add-page-btn" class="left-add" title="Add page">+</button>
      </div>
    </aside>
    <section class="content-area">
      <div id="sections"></div>
    </section>
    <aside class="side-bar right-bar">
      <div id="saved-links" class="saved-links"></div>
    </aside>
  </main>

  <template id="item-template">
    <div class="item">
      <img class="thumb" src="" alt="thumbnail">
      <div class="meta">
        <div class="title"></div>
        <div class="actions">
          <button class="star">☆</button>
          <button class="delete">✕</button>
        </div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>

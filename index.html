<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube Queue</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="title-group">
      <h1 id="view-title">Home</h1>
      <div id="header-links" class="header-links"></div>
    </div>
  </header>

  <main>
    <aside class="side-bar left-bar">
      <div class="left-bar-panel">
        <div class="left-bar-header">
          <div class="left-bar-title">Pages</div>
          <button id="add-page-btn" class="left-add" title="Add page">+</button>
        </div>
        <div id="left-nav" class="left-nav"></div>
      </div>
    </aside>
    <section class="content-area">
      <div id="sections"></div>
    </section>
    <aside class="side-bar right-bar">
      <div id="saved-links" class="saved-links"></div>
    </aside>
  </main>

  <template id="item-template">
    <div class="item">
      <img class="thumb" src="" alt="thumbnail">
      <div class="meta">
        <div class="title"></div>
        <div class="actions">
          <button class="star">☆</button>
          <button class="delete">✕</button>
        </div>
      </div>
    </div>
  </template>

  <div id="hold-action-dialog" class="hold-dialog hidden" aria-hidden="true">
    <div class="hold-dialog-backdrop"></div>
    <div class="hold-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="hold-dialog-title">
      <h2 id="hold-dialog-title" class="hold-dialog-title">Manage</h2>
      <div class="hold-dialog-actions">
        <button id="hold-move-up-btn" type="button">Move up</button>
        <button id="hold-move-down-btn" type="button">Move down</button>
        <button id="hold-delete-btn" type="button" class="danger">Delete</button>
      </div>
      <button id="hold-exit-btn" type="button" class="hold-exit-btn">Exit</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
